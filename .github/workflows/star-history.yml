name: Update star history chart

on:
  schedule:
    # Weekly, Mondays at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate & commit star history chart
        uses: carsteneu/mystarhistory@v1
        with:
          repos: ${{ github.repository }}
          # 默认 github.token 不是本仓库协作者，读不到 stargazers，
          # 需自建细粒度 PAT（Metadata: Read-only + Contents: Read and write）
          # 并存为仓库 secret STAR_HISTORY_TOKEN。
          token: ${{ secrets.STAR_HISTORY_TOKEN }}
          # 以下均为默认值，如需改动可取消注释：
          # branch: star-history
          # output-dir: assets/my-star-history
          # themes: light,dark
          # color: "#dd4528"
          # title: Star History
